<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Angie ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* Contenedor Principal */
        #pantalla1 {
            text-align: center;
            width: 100%;
        }

        /* Corazón */
        .corazon-wrapper {
            position: relative;
            width: 320px;
            height: 300px;
            margin: 0 auto;
        }

        .nombre-angie {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px red;
            z-index: 5;
        }

        .te-amo-particula {
            position: absolute;
            color: #ff0000;
            font-size: 10px;
            font-weight: bold;
            animation: latido 1.5s infinite ease-in-out;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Botón */
        .pregunta-box { margin-top: 30px; }
        h1 { color: white; font-size: 1.5rem; margin-bottom: 20px; }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        /* Galaxia */
        #galaxia {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0033, #000);
        }

        .frase-flotante {
            position: absolute;
            color: white;
            white-space: nowrap;
            animation: subir 7s linear forwards;
        }

        @keyframes subir {
            from { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="pantalla1">
        <div class="corazon-wrapper" id="corazon">
            <div class="nombre-angie">ANGIE</div>
        </div>
        <div class="pregunta-box">
            <h1>¿Quieres ser mi novia?</h1>
            <button onclick="activarGalaxia()">¡SÍ! ❤️</button>
        </div>
    </div>

    <div id="galaxia"></div>

    <script>
        // Dibujar corazón de "te amo"
        const contenedor = document.getElementById('corazon');
        for (let i = 0; i < 150; i++) {
            const t = Math.random() * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            const span = document.createElement('span');
            span.className = 'te-amo-particula';
            span.innerText = 'te amo';
            span.style.left = (160 + x * 9) + 'px';
            span.style.top = (140 + y * 9) + 'px';
            span.style.animationDelay = Math.random() * 2 + 's';
            contenedor.appendChild(span);
        }

        const frases = ["Eres única ✨", "Te amo, Angie ❤️", "Mi niña linda 😍", "Siempre juntos 👩‍❤️‍👨", "Eres mi sueño 🌙", "La más hermosa 🌹"];

        function activarGalaxia() {
            document.getElementById('pantalla1').style.display = 'none';
            const g = document.getElementById('galaxia');
            g.style.display = 'block';

            setInterval(() => {
                const f = document.createElement('div');
                f.className = 'frase-flotante';
                f.innerText = frases[Math.floor(Math.random() * frases.length)];
                f.style.left = Math.random() * 80 + '%';
                f.style.fontSize = (Math.random() * 20 + 15) + 'px';
                g.appendChild(f);
                setTimeout(() => f.remove(), 7000);
            }, 400);
        }
    </script>
</body>
</html>
